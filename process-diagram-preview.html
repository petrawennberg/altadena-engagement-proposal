<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>How it works — process diagram preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #2E3D26;
    font-family: 'DM Sans', Helvetica, sans-serif;
    color: #FAF6F0;
    text-align: center;
  }
  h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-weight: 400;
    margin: 0 0 20px;
    font-size: 28px;
  }
  p {
    margin: 0 0 30px;
    opacity: 0.7;
    font-size: 14px;
  }
  .frame {
    max-width: 1600px;
    margin: 0 auto;
    background: #FAF6F0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .frame img, .frame object {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<h1>How it works</h1>
<p>Preview of process-diagram.svg &mdash; drop the SVG file into Slides, Keynote, or any deck</p>
<div class="frame">
  <object type="image/svg+xml" data="process-diagram.svg" aria-label="Process flow diagram"></object>
</div>
</body>
</html>
